# Exemple Nginx reverse proxy pour Keycloak.
# À adapter : server_name, certificats, IP Keycloak.

server {
    listen 443 ssl http2;
    server_name sso.example.local;

    ssl_certificate     /etc/letsencrypt/live/sso.example.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sso.example.local/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://10.0.0.10:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
